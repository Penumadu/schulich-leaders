<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schulich Leader Nominees</title>
    <meta name="description" content="A comprehensive list of Schulich Leader Nominees, featuring top entrepreneurial-minded STEM students.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <div class="blueprint-overlay"></div>
    <div class="blueprint-grid"></div>

    <main class="container">
        <header>
            <div class="blueprint-metadata">
                <span class="meta-item">REF_NO: SLP-2026</span>
                <span class="meta-item">SCALE: 1:1</span>
                <span class="meta-item">COORD: 45.4215° N, 75.6972° W</span>
            </div>
            <div class="header-content">
                <h1 class="blueprint-title">SCHULICH LEADERS <span class="accent-year">// 2026</span></h1>
                <p class="subtitle">STEM Nominees & Selected Scholars Database</p>
            </div>
            
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="nominees">Full List (Nominees)</button>
                <button class="tab-btn" data-tab="scholars">Selected List (Scholars)</button>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search by name, school, city, or university..." aria-label="Search students">
                <div class="stats" id="statsDisplay">Loading...</div>
            </div>
        </header>

        <div class="nominees-grid" id="nomineesGrid">
            <!-- Nominee cards will be dynamically injected here -->
        </div>

        <div id="noResults" class="no-results hidden">
            <p>No results found matching your query.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
